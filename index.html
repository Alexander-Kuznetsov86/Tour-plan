<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Best Tour Plan Hotel Booking</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;700&family=Nunito:wght@400;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/swiper-bundle.min.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <header class="navbar">
      <div class="container">
        <div class="navbar-top">
          <a href="#!" class="logo">
            <img src="img/svg/header-logo.svg" alt="Logo: Best Tour Plan" class="logo__image" />
          </a>

          <form action="#!" class="search navbar__search">
            <input type="text" class="search__input" placeholder="Search Location" />
            <button class="search__button" type="submit">
              <img src="img/svg/search-ico.svg" alt="Icon: Search" />
            </button>
          </form>

          <a href="#!" class="user navbar__user">
            <img src="img/jpg/avatar-ico.jpg" alt="Avatar: Nathan" class="user__avatar" />
            <span class="user__name">Nathan</span>
          </a>
          <!-- / .user -->
          <button class="menu-button navbar-top__menu-button">
            <span class="menu-button__line"></span>
            <span class="menu-button__line"></span>
            <span class="menu-button__line"></span>
          </button>
        </div>
        <!-- /.navbar-top -->
      </div>
      <!-- /.container -->
      <nav class="navbar-bottom">
        <div class="container">
          <ul class="navbar-menu">
            <li class="navbar__item"><a href="#!" class="navbar__link">All Deals</a></li>
            <li class="navbar__item"><a href="#!" class="navbar__link">Hotels</a></li>
            <li class="navbar__item"><a href="#!" class="navbar__link">Activities</a></li>
            <li class="navbar__item"><a href="#!" class="navbar__link">Hotel Day Packages</a></li>
            <li class="navbar__item"><a href="#!" class="navbar__link">Restaurants</a></li>
            <li class="navbar__item"><a href="#!" class="navbar__link">Events</a></li>
            <li class="navbar__item"><a href="#!" class="navbar__link">Rodrigues</a></li>
          </ul>
        </div>
        <!-- /.container -->
      </nav>
    </header>

    <nav class="breadcrumbs">
      <div class="container">
        <ul class="breadcrumbs-list">
          <li class="breadcrumbs-list__item">
            <a href="#!" class="breadcrumbs-list__link">Home</a>
          </li>
          <li class="breadcrumbs-list__item">
            <a href="#!" class="breadcrumbs-list__link">Flash Offers</a>
          </li>
          <li class="breadcrumbs-list__item">Grand Hilton Hotel</li>
        </ul>
      </div>
      <!-- /.container -->
    </nav>
    <!-- /.breadcrumbs -->
    <section class="hotel">
      <div class="container">
        <div class="hotel-info">
          <div class="hotel-info__text">
            <div class="hotel-wrapper">
              <div class="stars">
                <img src="img/svg/star.svg" alt="Star" />
                <img src="img/svg/star.svg" alt="Star" />
                <img src="img/svg/star.svg" alt="Star" />
                <img src="img/svg/star.svg" alt="Star" />
                <img src="img/svg/star.svg" alt="Star" />
              </div>
              <h1 class="hotel-name hotel-info__name">grand hilton hotel</h1>
              <span class="offer hotel-info__offer">Flash Offer</span>
            </div>
            <span class="hotel-description"
              >Half-Board/ All Inclusive + Complimentary Activities + Child Stays Free</span
            >
          </div>
          <!-- /.hotel-info__text -->
          <div class="rating hotel-info__rating">
            <span class="rating__text">User Rattings</span>
            <span class="rating__counter">4.5/5</span>
          </div>
          <!-- /.hotel-info__right -->
        </div>
        <!-- /.hotel-info -->
        <section class="hotel-grid">
          <div class="slider">
            <!-- Slider main container -->
            <div class="swiper-container">
              <!-- Additional required wrapper -->
              <div class="swiper-wrapper">
                <!-- Slides -->
                <div class="swiper-slide"><img src="img/jpg/slide-1.jpg" alt="Slide" /></div>
                <div class="swiper-slide"><img src="img/jpg/slide-2.jpg" alt="Slide" /></div>
                <div class="swiper-slide"><img src="img/jpg/slide-3.jpg" alt="Slide" /></div>
                <div class="swiper-slide"><img src="img/jpg/slide-4.jpg" alt="Slide" /></div>
                <div class="swiper-slide"><img src="img/jpg/slide-5.jpg" alt="Slide" /></div>
                <div class="swiper-slide"><img src="img/jpg/slide-6.jpg" alt="Slide" /></div>
                <div class="swiper-slide"><img src="img/jpg/slide-7.jpg" alt="Slide" /></div>
                <div class="swiper-slide"><img src="img/jpg/slide-8.jpg" alt="Slide" /></div>
                <div class="swiper-slide"><img src="img/jpg/slide-9.jpg" alt="Slide" /></div>
                <div class="swiper-slide"><img src="img/jpg/slide-10.jpg" alt="Slide" /></div>
              </div>
              <!-- If we need navigation buttons -->
              <button class="slider-button slider-button--prev"></button>
              <button class="slider-button slider-button--next"></button>
            </div>
            <!-- /.swiper-container -->
          </div>
          <!-- /.slider -->
        </section>
        <!-- /.hotel-grid -->
      </div>
      <!-- /.container -->
    </section>
    <script src="js/swiper-bundle.min.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
