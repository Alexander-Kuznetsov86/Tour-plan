<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Best Tour Plan Hotel Booking</title>
</head>

<body>
  <header class="header">
    <div class="container">
      <div class="header-top">

        <a href="#!" class="logo">
          <img src="img/svg/header-logo.svg" alt="Logo: Best Tour Plan" class="logo--image" />
        </a>

        <form action="#!" class="search">
          <input type="text" name="search-input" />
          <button class="search__button" type="submit">
            <img src="img/svg/search-ico.svg" alt="Icon: Search">
          </button>
        </form>

        <a class="user">
          <img src="img/jpg/avatar-ico.jpg" alt="avatar: Nathan" class="user__avatar">
        </a>
        <span class="user__name">Nathan</span>
        <!-- /.user -->
      </div>
      <!-- /.header-top -->
      
      
    </div>
    <!-- /.container -->
  </header>
</body>

</html>
